name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run a dry-run publish check, or publish to npm"
        required: true
        default: "dry-run"
        type: choice
        options:
          - "dry-run"
          - "publish"
      npm_tag:
        description: "npm dist-tag to use when publishing"
        required: true
        default: "latest"

permissions:
  contents: read
  id-token: write

jobs:
  npm:
    runs-on: ubuntu-latest
    # Gates real publishes behind the "release" environment's required reviewers,
    # and is the environment matched by the npm trusted publisher configuration.
    environment: release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # Trusted publishing requires Node >= 22.14.0 and npm >= 11.5.1.
          node-version: 24
          # No registry-url: setting it makes setup-node write an .npmrc with
          # `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}` and inject a
          # placeholder NODE_AUTH_TOKEN. npm then authenticates with that bogus
          # token instead of doing the OIDC exchange, and the publish fails with
          # a masked E404. npm defaults to registry.npmjs.org, which trusted
          # publishing targets, so the registry does not need to be set here.
          package-manager-cache: false

      - name: Update npm for trusted publishing
        run: |
          npm install -g npm@latest
          npm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run release checks
        run: pnpm release:check

      # Publish with pnpm, not `npm publish <tarball>`. pnpm runs the publish
      # from each package directory (rewriting workspace:* deps to real
      # versions), which is what lets npm's OIDC trusted-publishing token
      # exchange engage. Publishing a pre-packed tarball via `npm publish` skips
      # OIDC entirely and fails with a misleading ENEEDAUTH/E404.
      - name: Dry-run publish
        run: pnpm -r publish --dry-run --no-git-checks --access public --tag "${{ inputs.npm_tag || 'latest' }}"

      - name: Require tag for real publish
        if: (github.event_name == 'push' || inputs.mode == 'publish') && !startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "Real publish must run from a v* tag, for example refs/tags/v0.2.0." >&2
          exit 1

      - name: Verify trusted publishing environment
        if: github.event_name == 'push' || inputs.mode == 'publish'
        run: |
          set -euo pipefail
          test -n "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" || {
            echo "Missing GitHub OIDC request URL. Check id-token: write for the release job." >&2
            exit 1
          }
          test -n "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" || {
            echo "Missing GitHub OIDC request token. Check id-token: write for the release job." >&2
            exit 1
          }

      # No NODE_AUTH_TOKEN / NPM_TOKEN: auth is via OIDC trusted publishing.
      # `pnpm -r publish` publishes each package from its directory, skips the
      # private root and already-published versions, and attaches provenance.
      - name: Publish to npm
        if: github.event_name == 'push' || inputs.mode == 'publish'
        run: pnpm -r publish --provenance --no-git-checks --access public --tag "${{ inputs.npm_tag || 'latest' }}"
