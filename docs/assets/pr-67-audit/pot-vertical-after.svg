<svg xmlns="http://www.w3.org/2000/svg" class="wire-lang" viewBox="0 0 468 240" width="468" height="240" role="img" data-wire-lang-version="0.3.0">
<title>Vertical potentiometer</title>
<desc>The wiper and labels remain clear when the potentiometer rotates.</desc>
<style>.wire-lang { background: #ffffff; }
.wire-wire { stroke: #1f2937; stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
.wire-symbol { stroke: #1f2937; stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
.wire-symbol-bg { stroke: #1f2937; stroke-width: 1.5; fill: #ffffff; }
.wire-symbol-fill { fill: #1f2937; stroke: none; }
.wire-junction { fill: #1f2937; }
.wire-label { fill: #111827; font: 600 11px var(--wire-font, system-ui, sans-serif); }
.wire-pin-label { fill: #374151; font: 9px var(--wire-font, system-ui, sans-serif); }
.wire-net-label { fill: #2563eb; font: 600 10px var(--wire-font, system-ui, sans-serif); }
.wire-annotation { fill: #6b7280; font: italic 10px var(--wire-font, system-ui, sans-serif); }</style>
<rect class="wire-background" x="0" y="0" width="468" height="240" fill="#ffffff"/>
<g class="wire-wires"><g class="wire-net" data-wire-kind="net" data-wire-style="wire" data-wire-net="TOP"><line class="wire-wire" x1="60" y1="36" x2="136" y2="36"/><line class="wire-wire" x1="60" y1="62" x2="60" y2="36"/><line class="wire-wire" x1="136" y1="94" x2="136" y2="36"/></g><g class="wire-net" data-wire-kind="net" data-wire-style="wire" data-wire-net="WIPER"><line class="wire-wire" x1="36" y1="152" x2="252" y2="152"/><line class="wire-wire" x1="36" y1="94" x2="36" y2="152"/><line class="wire-wire" x1="252" y1="94" x2="252" y2="152"/></g><g class="wire-net" data-wire-kind="net" data-wire-style="wire" data-wire-net="BOTTOM"><line class="wire-wire" x1="60" y1="178" x2="432" y2="178"/><line class="wire-wire" x1="60" y1="126" x2="60" y2="178"/><line class="wire-wire" x1="432" y1="94" x2="432" y2="178"/></g><g class="wire-net" data-wire-kind="net" data-wire-style="wire" data-wire-net="RETURN"><line class="wire-wire" x1="200" y1="204" x2="368" y2="204"/><line class="wire-wire" x1="200" y1="94" x2="200" y2="204"/><line class="wire-wire" x1="316" y1="94" x2="316" y2="204"/><line class="wire-wire" x1="368" y1="94" x2="368" y2="204"/></g></g>
<g class="wire-component" data-wire-kind="component" data-wire-id="RV1" data-wire-type="Potentiometer" data-wire-symbol="potentiometer" id="wire-component-RV1"><path class="wire-symbol" fill="none" d="M 60 62 L 60 76 L 67 79 L 53 85 L 67 91 L 53 97 L 67 103 L 53 109 L 60 112 L 60 126"/><path class="wire-symbol" fill="none" d="M 36 94 L 56.5 94"/><polygon class="wire-symbol-fill" points="60,94 56.5,96.2 56.5,91.8"/><text class="wire-label" x="90" y="91.5" text-anchor="start">RV1</text><text class="wire-label" x="90" y="104.5" text-anchor="start">10k</text></g><g class="wire-component" data-wire-kind="component" data-wire-id="R1" data-wire-type="Resistor" data-wire-symbol="resistor" id="wire-component-R1"><path class="wire-symbol" fill="none" d="M 136 94 L 150 94 L 153 87 L 159 101 L 165 87 L 171 101 L 177 87 L 183 101 L 186 94 L 200 94"/><text class="wire-label" x="168" y="77" text-anchor="middle">R1</text><text class="wire-label" x="168" y="64" text-anchor="middle">1k</text></g><g class="wire-component" data-wire-kind="component" data-wire-id="R2" data-wire-type="Resistor" data-wire-symbol="resistor" id="wire-component-R2"><path class="wire-symbol" fill="none" d="M 252 94 L 266 94 L 269 87 L 275 101 L 281 87 L 287 101 L 293 87 L 299 101 L 302 94 L 316 94"/><text class="wire-label" x="284" y="77" text-anchor="middle">R2</text><text class="wire-label" x="284" y="64" text-anchor="middle">2k</text></g><g class="wire-component" data-wire-kind="component" data-wire-id="R3" data-wire-type="Resistor" data-wire-symbol="resistor" id="wire-component-R3"><path class="wire-symbol" fill="none" d="M 432 94 L 418 94 L 415 87 L 409 101 L 403 87 L 397 101 L 391 87 L 385 101 L 382 94 L 368 94"/><text class="wire-label" x="400" y="77" text-anchor="middle">R3</text><text class="wire-label" x="400" y="64" text-anchor="middle">3k</text></g>
